<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no">
<title>Galerie</title>
<style>
  :root{
    --ink:#0E1014; --panel:#161922; --panel2:#1E222D; --line:#2A2F3C;
    --mist:#8B93A4; --paper:#ECEEF3; --brass:#C9A24B; --danger:#E0564B;
    --serif:Georgia,"Times New Roman",serif;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;background:var(--ink);color:var(--paper);
    font-family:var(--sans);overflow:hidden;overscroll-behavior:none}
  button{font-family:inherit;cursor:pointer;border:0;background:none;color:inherit}
  .hidden{display:none!important}

  #gallery{position:fixed;inset:0;display:flex;flex-direction:column}
  .topbar{display:flex;align-items:center;gap:14px;padding:18px 18px 12px;
    background:linear-gradient(var(--ink),rgba(14,16,20,0));position:relative;z-index:5}
  .topbar .title{font-family:var(--serif);font-size:21px;letter-spacing:.03em;flex:1}
  .topbar .title small{display:block;font-family:var(--sans);font-size:11px;
    letter-spacing:.32em;text-transform:uppercase;color:var(--brass);margin-bottom:1px}
  .wipeBtn{background:rgba(224,86,75,.14);border:1px solid rgba(224,86,75,.45);
    color:#ffb3ad;border-radius:13px;padding:10px 12px;font-size:13px;font-weight:700}
  .wipeBtn:active{transform:scale(.97)}
  .browserBtn{background:rgba(201,162,75,.14);border:1px solid rgba(201,162,75,.45);
    color:#f4d58b;border-radius:13px;padding:10px 12px;font-size:13px;font-weight:700}
  .browserBtn:active{transform:scale(.97)}
  .grid{flex:1;overflow-y:auto;overflow-x:hidden;padding:6px 12px 110px;
    columns:3;column-gap:8px;-webkit-overflow-scrolling:touch}
  @media(max-width:380px){.grid{columns:2}}
  .cell{break-inside:avoid;margin-bottom:8px;border-radius:14px;overflow:hidden;
    background:var(--panel);position:relative;border:1px solid var(--line);
    opacity:0;transform:translateY(8px);animation:rise .4s forwards}
  @keyframes rise{to{opacity:1;transform:none}}
  .cell img{width:100%;display:block}
  .cell .vthumb{width:100%;aspect-ratio:1;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:6px;color:var(--mist);
    background:linear-gradient(135deg,#1b1f2a,#13161d);position:relative;overflow:hidden}
  .cell .vthumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:brightness(.78)}
  .cell .vthumb::after{content:"";position:absolute;inset:0;background:linear-gradient(rgba(0,0,0,.12),rgba(0,0,0,.45));pointer-events:none}
  .cell .vthumb .play{width:42px;height:42px;border-radius:50%;border:1.5px solid var(--brass);
    color:var(--brass);display:grid;place-items:center;font-size:18px;position:relative;z-index:2;background:rgba(0,0,0,.35)}
  .cell .vthumb .nm{font-size:11px;padding:0 8px;text-align:center;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:90%;position:relative;z-index:2;text-shadow:0 1px 4px #000}
  .empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
    justify-content:center;color:var(--mist);gap:6px;padding:30px;text-align:center}
  .empty .big{font-family:var(--serif);font-size:20px;color:var(--paper)}
  .fab{position:fixed;right:20px;bottom:26px;height:56px;padding:0 24px;border-radius:28px;
    background:var(--brass);color:#1a1407;font-weight:700;font-size:16px;
    display:flex;align-items:center;gap:8px;box-shadow:0 12px 30px rgba(0,0,0,.45);z-index:6}
  .fab:active{transform:scale(.97)}

  #status{position:fixed;left:16px;right:16px;bottom:96px;z-index:20;
    background:var(--panel2);border:1px solid var(--line);border-radius:14px;
    padding:14px 16px;font-size:13.5px;color:var(--paper);
    box-shadow:0 14px 30px rgba(0,0,0,.5);display:none}
  #status.on{display:block}
  #status .bar{height:6px;border-radius:3px;background:#0c0e13;overflow:hidden;margin-top:10px}
  #status .bar i{display:block;height:100%;width:0;background:var(--brass);transition:width .15s}
  #status .msg.error{color:#ffb3ad}

  #viewer{position:fixed;inset:0;background:#000;z-index:30;display:flex;flex-direction:column;
    opacity:0;pointer-events:none;transition:opacity .25s}
  #viewer.on{opacity:1;pointer-events:auto}
  .vhead{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;
    justify-content:space-between;padding:14px 14px;z-index:3;
    background:linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,0))}
  .vstage{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;touch-action:none}
  .vstage img,.vstage video{max-width:100%;max-height:100%;object-fit:contain;
    will-change:transform;transition:transform .18s ease-out}
  .vloading{color:var(--mist);font-size:14px}
  .vfoot{position:absolute;bottom:0;left:0;right:0;display:flex;align-items:center;
    justify-content:center;padding:18px;z-index:3;
    background:linear-gradient(rgba(0,0,0,0),rgba(0,0,0,.55))}
  .vbtn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.16);
    color:#fff;border-radius:12px;padding:12px 16px;font-size:15px;backdrop-filter:blur(8px)}
  .vbtn.del{background:rgba(224,86,75,.16);border-color:rgba(224,86,75,.4);color:#ffb3ad}
  .vnav{position:absolute;top:50%;transform:translateY(-50%);width:46px;height:46px;
    border-radius:50%;background:rgba(0,0,0,.4);color:#fff;font-size:24px;display:grid;
    place-items:center;z-index:3;backdrop-filter:blur(6px)}
  .vnav.prev{left:10px} .vnav.next{right:10px}
  .counter{font-size:13px;color:#cfd3da;letter-spacing:.04em}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>

<section id="gallery">
  <div class="topbar">
    <div class="title"><small>Médias</small>Galerie</div>
    <button id="browserBtn" class="browserBtn">Navigateur</button>
    <button id="wipeBtn" class="wipeBtn">Tout supprimer</button>
  </div>
  <div id="grid" class="grid"></div>
  <div id="status"><div class="msg" id="statusMsg"></div><div class="bar"><i id="statusBar"></i></div></div>
  <button id="addBtn" class="fab">＋ Ajouter</button>
  <input id="file" type="file" accept="image/*,video/*" multiple class="hidden">
</section>

<section id="browser" class="hidden" style="position:fixed;inset:0;background:#0E1014;z-index:25;display:flex;flex-direction:column">
  <div style="display:flex;gap:8px;align-items:center;padding:12px;background:#161922;border-bottom:1px solid #2A2F3C">
    <button id="bClose" class="vbtn">‹ Galerie</button>
    <input id="bUrl" type="url" placeholder="https://..." style="flex:1;background:#0c0e13;color:#ECEEF3;border:1px solid #2A2F3C;border-radius:12px;padding:12px;font-size:14px">
    <button id="bGo" class="vbtn">Ouvrir</button>
  </div>
  <div style="display:flex;gap:8px;padding:10px;background:#161922;border-bottom:1px solid #2A2F3C">
    <button id="bDl" class="vbtn" style="flex:1;background:rgba(201,162,75,.18);border-color:rgba(201,162,75,.45);color:#f4d58b">Télécharger la vidéo / le fichier de ce lien</button>
  </div>
  <iframe id="bFrame" sandbox="allow-scripts allow-forms allow-same-origin allow-popups allow-downloads" style="flex:1;border:0;background:#fff"></iframe>
</section>

<section id="viewer">
  <div class="vhead">
    <button id="vClose" class="vbtn">‹ Retour</button>
    <span id="vCount" class="counter"></span>
    <span style="width:64px"></span>
  </div>
  <button id="vPrev" class="vnav prev">‹</button>
  <div id="vStage" class="vstage"></div>
  <button id="vNext" class="vnav next">›</button>
  <div class="vfoot"><button id="vDel" class="vbtn del">Supprimer</button></div>
</section>

<script>
/* ===== Stockage simple, non chiffré (IndexedDB, par morceaux pour les gros fichiers) ===== */
const Store = (() => {
  const DB='gallery_db', ITEMS='items', CHUNKS='chunks', CHUNK=4*1024*1024;
  let _urls=new Set();
  function db(){return new Promise((res,rej)=>{const r=indexedDB.open(DB,2);
    r.onupgradeneeded=()=>{const d=r.result;
      if(!d.objectStoreNames.contains(ITEMS))d.createObjectStore(ITEMS,{keyPath:'id'});
      if(!d.objectStoreNames.contains(CHUNKS))d.createObjectStore(CHUNKS,{keyPath:'k'});};
    r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});}
  const st=(s,m)=>db().then(d=>d.transaction(s,m).objectStore(s));
  const get=(s,k)=>st(s,'readonly').then(o=>new Promise((res,rej)=>{const q=o.get(k);q.onsuccess=()=>res(q.result);q.onerror=()=>rej(q.error);}));
  const put=(s,v)=>st(s,'readwrite').then(o=>new Promise((res,rej)=>{const q=o.put(v);q.onsuccess=()=>res();q.onerror=()=>rej(q.error);}));
  const del=(s,k)=>st(s,'readwrite').then(o=>new Promise((res,rej)=>{const q=o.delete(k);q.onsuccess=()=>res();q.onerror=()=>rej(q.error);}));
  const clear=s=>st(s,'readwrite').then(o=>new Promise((res,rej)=>{const q=o.clear();q.onsuccess=()=>res();q.onerror=()=>rej(q.error);}));
  const all=s=>st(s,'readonly').then(o=>new Promise((res,rej)=>{const q=o.getAll();q.onsuccess=()=>res(q.result);q.onerror=()=>rej(q.error);}));

  async function add(file,onProgress){
    const id=Date.now()+'_'+Math.random().toString(36).slice(2);
    const total=Math.max(1,Math.ceil(file.size/CHUNK));
    try{
      for(let seq=0;seq<total;seq++){
        const buf=await file.slice(seq*CHUNK,Math.min(file.size,(seq+1)*CHUNK)).arrayBuffer();
        await put(CHUNKS,{k:id+':'+seq,data:buf});
        if(onProgress)onProgress((seq+1)/total);
      }
      await put(ITEMS,{id,name:file.name,type:file.type||'application/octet-stream',size:file.size,chunks:total});
      return id;
    }catch(e){for(let seq=0;seq<total;seq++){try{await del(CHUNKS,id+':'+seq);}catch(_){}}throw e;}
  }
  async function importNative(sessionId,name,type,size,onProgress){
    const NativeDownloader=window.Capacitor&&window.Capacitor.Plugins&&window.Capacitor.Plugins.NativeDownloader;
    if(!NativeDownloader)throw new Error('Téléchargement natif indisponible.');
    const id=Date.now()+'_'+Math.random().toString(36).slice(2);
    const total=Math.max(1,Math.ceil((size||1)/CHUNK));
    try{
      for(let seq=0;seq<total;seq++){
        const r=await NativeDownloader.readChunk({sessionId,seq,chunkSize:CHUNK});
        const buf=base64ToArrayBuffer(r.base64||'');
        await put(CHUNKS,{k:id+':'+seq,data:buf});
        if(onProgress)onProgress((seq+1)/total);
      }
      await put(ITEMS,{id,name:name||'video.mp4',type:type||'video/mp4',size:size||0,chunks:total});
      return id;
    }catch(e){for(let seq=0;seq<total;seq++){try{await del(CHUNKS,id+':'+seq);}catch(_){}}throw e;}
  }
  async function list(){return (await all(ITEMS)).sort((a,b)=>a.id<b.id?1:-1).map(r=>({id:r.id,type:r.type,name:r.name,size:r.size,chunks:r.chunks,thumb:r.thumb||''}));}
  async function setThumb(id,thumb){const it=await get(ITEMS,id);if(!it)return;it.thumb=thumb;await put(ITEMS,it);}
  async function meta(id){const it=await get(ITEMS,id);if(!it)throw new Error('Introuvable.');return it;}
  async function chunk(id,seq){const c=await get(CHUNKS,id+':'+seq);if(!c)throw new Error('Morceau vidéo manquant.');return c.data;}
  async function url(id){const it=await get(ITEMS,id);if(!it)throw new Error('Introuvable.');
    const parts=[];for(let seq=0;seq<it.chunks;seq++){const c=await get(CHUNKS,id+':'+seq);parts.push(new Uint8Array(c.data));}
    const u=URL.createObjectURL(new Blob(parts,{type:it.type}));_urls.add(u);return u;}
  function revoke(u){try{URL.revokeObjectURL(u);}catch(e){}_urls.delete(u);}
  async function remove(id){const it=await get(ITEMS,id);if(it)for(let seq=0;seq<it.chunks;seq++){try{await del(CHUNKS,id+':'+seq);}catch(_){}}return del(ITEMS,id);}
  async function wipeAll(){
    for(const u of Array.from(_urls))revoke(u);
    try{await clear(CHUNKS);}catch(_){}
    try{await clear(ITEMS);}catch(_){}
    try{localStorage.clear();}catch(_){}
    try{sessionStorage.clear();}catch(_){}
    try{if('caches' in window){const names=await caches.keys();await Promise.all(names.map(n=>caches.delete(n)));}}catch(_){}
    try{if(navigator.serviceWorker){const regs=await navigator.serviceWorker.getRegistrations();await Promise.all(regs.map(r=>r.unregister()));}}catch(_){}
  }
  return {add,importNative,list,meta,chunk,url,revoke,remove,setThumb,wipeAll};
})();

const $=id=>document.getElementById(id);
let items=[],viewIndex=-1,curUrl=null;
function isVideo(it){return (it.type||'').startsWith('video')||/\.(mp4|mov|m4v|webm|mkv|avi|3gp|ts|m2ts)$/i.test(it.name||'');}
function hasNativeVideo(){return !!(window.Capacitor&&window.Capacitor.Plugins&&window.Capacitor.Plugins.NativeVideo);}
function abToBase64(buf){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(String(r.result).split(',')[1]||'');r.onerror=()=>rej(r.error);r.readAsDataURL(new Blob([buf]));});}
function base64ToArrayBuffer(b64){const bin=atob(b64);const len=bin.length;const bytes=new Uint8Array(len);for(let i=0;i<len;i++)bytes[i]=bin.charCodeAt(i);return bytes.buffer;}
function hasNativeDownloader(){return !!(window.Capacitor&&window.Capacitor.Plugins&&window.Capacitor.Plugins.NativeDownloader);}

function status(msg,frac,isErr){const box=$('status');box.classList.add('on');
  const m=$('statusMsg');m.textContent=msg;m.className='msg'+(isErr?' error':'');
  $('statusBar').style.width=Math.round((frac||0)*100)+'%';}
function statusHide(delay){setTimeout(()=>$('status').classList.remove('on'),delay||0);}


async function generateNativeThumb(id){
  if(!hasNativeVideo())return;
  const NativeVideo=window.Capacitor.Plugins.NativeVideo;
  const meta=await Store.meta(id);
  const start=await NativeVideo.startSession({name:meta.name||'video',mime:meta.type||'video/mp4'});
  const sessionId=start.sessionId;
  for(let seq=0;seq<meta.chunks;seq++){
    const buf=await Store.chunk(id,seq);
    await NativeVideo.appendChunk({sessionId,base64:await abToBase64(buf)});
  }
  const out=await NativeVideo.finishThumbnail({sessionId});
  if(out&&out.thumbnail)await Store.setThumb(id,'data:image/jpeg;base64,'+out.thumbnail);
}


$('browserBtn').onclick=()=>{$('browser').classList.remove('hidden');};
$('bClose').onclick=()=>{$('browser').classList.add('hidden');renderGrid();};
function normalizeUrl(u){u=(u||'').trim();if(!u)return '';if(!/^https?:\/\//i.test(u))u='https://'+u;return u;}
$('bGo').onclick=()=>{const u=normalizeUrl($('bUrl').value);if(!u)return;$('bUrl').value=u;$('bFrame').src=u;};
$('bUrl').addEventListener('keydown',e=>{if(e.key==='Enter')$('bGo').click();});
$('bDl').onclick=async()=>{
  if(!hasNativeDownloader()){status('Téléchargement natif indisponible. Recompile l’APK avec ce zip.',1,true);return;}
  const u=normalizeUrl($('bUrl').value||$('bFrame').src);
  if(!u){status('Colle ou ouvre un lien direct vers une vidéo/fichier.',1,true);return;}
  let sessionId=null;
  try{
    status('Téléchargement privé dans l’app…',0.05);
    const d=await window.Capacitor.Plugins.NativeDownloader.downloadUrl({url:u});
    sessionId=d.sessionId;
    const mb=((d.size||0)/1048576).toFixed(1);
    status('Import dans le coffre — '+(d.name||'fichier')+' ('+mb+' Mo)…',0.15);
    const id=await Store.importNative(d.sessionId,d.name,d.type,d.size,frac=>status('Import dans le coffre…',frac));
    if(isVideo({name:d.name,type:d.type})){try{status('Image preview vidéo…',1);await generateNativeThumb(id);}catch(_){}}
    try{await window.Capacitor.Plugins.NativeDownloader.deleteSession({sessionId:d.sessionId});}catch(_){}
    status('Téléchargement ajouté à la galerie.',1);
    statusHide(2200);
    await renderGrid();
  }catch(e){
    if(sessionId){try{await window.Capacitor.Plugins.NativeDownloader.deleteSession({sessionId});}catch(_){}}
    status('Échec téléchargement : '+(e&&e.message?e.message:e),1,true);
  }
};

$('wipeBtn').onclick=async()=>{
  const ok=confirm('Tout supprimer définitivement ? Photos, vidéos et previews seront effacées de cette app. Impossible de les récupérer dans l’application.');
  if(!ok)return;
  const ok2=confirm('Dernière confirmation : supprimer TOUS les médias maintenant ?');
  if(!ok2)return;
  try{
    status('Suppression définitive de tous les médias…',0.35);
    closeViewer();
    if(hasNativeVideo()&&window.Capacitor.Plugins.NativeVideo.wipeNativeCache){
      try{await window.Capacitor.Plugins.NativeVideo.wipeNativeCache();}catch(_){}
    }
    if(hasNativeDownloader()&&window.Capacitor.Plugins.NativeDownloader.wipeDownloads){
      try{await window.Capacitor.Plugins.NativeDownloader.wipeDownloads();}catch(_){}
    }
    await Store.wipeAll();
    items=[];viewIndex=-1;
    status('Tout a été supprimé.',1);
    await renderGrid();
    statusHide(1800);
  }catch(e){status('Erreur suppression : '+(e&&e.message?e.message:e),1,true);}
};

$('addBtn').onclick=()=>$('file').click();
$('file').onchange=async e=>{
  const files=[...e.target.files];e.target.value='';if(!files.length)return;
  let i=0;
  for(const f of files){i++;const mb=(f.size/1048576).toFixed(1);
    try{
      status(`Ajout ${i}/${files.length} — ${f.name} (${mb} Mo)…`,0);
      const id=await Store.add(f,frac=>status(`Ajout ${i}/${files.length} — ${f.name} (${mb} Mo)`,frac));
      if(isVideo({name:f.name,type:f.type})){
        try{status(`Image preview vidéo… ${f.name}`,1);await generateNativeThumb(id);}catch(_){/* La vidéo reste lisible même si l'image preview échoue. */}
      }
      status(`Ajouté : ${f.name}`,1);
    }catch(err){status(`Échec sur ${f.name} : ${err&&err.message?err.message:err}`,1,true);statusHide(6000);await renderGrid();return;}
  }
  statusHide(1500);await renderGrid();
};

async function renderGrid(){
  const g=$('grid');g.innerHTML='';
  try{items=await Store.list();}catch(e){status('Erreur de lecture : '+e.message,1,true);return;}
  if(!items.length){g.innerHTML='<div class="empty"><div class="big">Galerie vide</div>'+
    '<div>Touche « Ajouter » pour mettre une photo ou vidéo.</div></div>';return;}
  items.forEach((it,i)=>{
    const cell=document.createElement('div');cell.className='cell';
    cell.style.animationDelay=(Math.min(i,12)*22)+'ms';cell.onclick=()=>openViewer(i);
    if(isVideo(it)){
      const thumb=it.thumb?'<img src="'+it.thumb+'" alt="">':'';
      cell.innerHTML='<div class="vthumb">'+thumb+'<div class="play">▶</div><div class="nm">'+(it.name||'vidéo')+'</div></div>';
    }else{
      Store.url(it.id).then(u=>{cell.innerHTML='<img src="'+u+'" alt="">';})
        .catch(()=>{cell.innerHTML='<div class="vthumb"><div class="nm">illisible</div></div>';});
    }
    g.appendChild(cell);
  });
}

let zoom=1,panX=0,panY=0;
async function openViewer(i){viewIndex=i;$('viewer').classList.add('on');await showMedia();}
async function playNativeVideo(it,stage){
  const NativeVideo=window.Capacitor.Plugins.NativeVideo;
  const meta=await Store.meta(it.id);
  const start=await NativeVideo.startSession({name:meta.name||'video',mime:meta.type||'video/mp4'});
  const sessionId=start.sessionId;
  for(let seq=0;seq<meta.chunks;seq++){
    const buf=await Store.chunk(it.id,seq);
    const b64=await abToBase64(buf);
    await NativeVideo.appendChunk({sessionId,base64:b64});
    stage.innerHTML='<div class="vloading">Préparation vidéo native… '+Math.round(((seq+1)/meta.chunks)*100)+'%</div>';
  }
  await NativeVideo.finishAndPlay({sessionId,title:meta.name||'Vidéo'});
  stage.innerHTML='<div class="vloading">Lecture ouverte avec le lecteur Android natif.<br><br>Reviens ici avec le bouton retour.</div>';
}
async function showMedia(){
  const stage=$('vStage');if(curUrl){Store.revoke(curUrl);curUrl=null;}
  stage.innerHTML='<div class="vloading">Chargement…</div>';zoom=1;panX=panY=0;
  const it=items[viewIndex];$('vCount').textContent=(viewIndex+1)+' / '+items.length;
  try{
    if(isVideo(it)&&hasNativeVideo()){
      await playNativeVideo(it,stage);
      return;
    }
    curUrl=await Store.url(it.id);stage.innerHTML='';
    let el;
    if(isVideo(it)){
      el=document.createElement('video');el.src=curUrl;el.controls=true;el.autoplay=true;el.playsInline=true;
      el.onerror=()=>{stage.innerHTML='<div class="vloading">Vidéo non lisible par la WebView Android.<br>Codec/conteneur probablement non supporté. Rebuild avec ExoPlayer ou convertis en MP4 H.264/AAC.</div>';};
    }
    else{el=document.createElement('img');el.src=curUrl;el.id='vImg';el.addEventListener('dblclick',toggleZoom);el.addEventListener('pointerdown',startPan);}
    stage.appendChild(el);
  }catch(e){stage.innerHTML='<div class="vloading">Erreur : '+(e&&e.message?e.message:e)+'</div>';}
}
function applyTransform(){const im=$('vImg');if(im)im.style.transform=`translate(${panX}px,${panY}px) scale(${zoom})`;}
function toggleZoom(){zoom=zoom>1?1:2.4;panX=panY=0;applyTransform();}
let panning=false,sx=0,sy=0;
function startPan(e){if(zoom<=1)return;panning=true;sx=e.clientX-panX;sy=e.clientY-panY;e.target.setPointerCapture(e.pointerId);}
$('vStage').addEventListener('pointermove',e=>{if(panning){panX=e.clientX-sx;panY=e.clientY-sy;applyTransform();}});
$('vStage').addEventListener('pointerup',()=>panning=false);
function closeViewer(){$('viewer').classList.remove('on');if(curUrl){Store.revoke(curUrl);curUrl=null;}$('vStage').innerHTML='';}
$('vClose').onclick=closeViewer;
$('vPrev').onclick=()=>nav(-1);$('vNext').onclick=()=>nav(1);
function nav(d){if(zoom>1)return;const n=viewIndex+d;if(n<0||n>=items.length)return;viewIndex=n;showMedia();}
$('vDel').onclick=async()=>{await Store.remove(items[viewIndex].id);closeViewer();await renderGrid();};
let tsx=0,tsy=0;
$('vStage').addEventListener('touchstart',e=>{if(e.touches.length===1){tsx=e.touches[0].clientX;tsy=e.touches[0].clientY;}},{passive:true});
$('vStage').addEventListener('touchend',e=>{
  if(zoom>1)return;const dx=e.changedTouches[0].clientX-tsx,dy=e.changedTouches[0].clientY-tsy;
  if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy))nav(dx<0?1:-1);
  else if(dy>90&&Math.abs(dy)>Math.abs(dx))closeViewer();
},{passive:true});
document.addEventListener('keydown',e=>{
  if(!$('viewer').classList.contains('on'))return;
  if(e.key==='ArrowLeft')nav(-1);if(e.key==='ArrowRight')nav(1);if(e.key==='Escape')closeViewer();
});

document.addEventListener('visibilitychange',()=>{if(document.hidden&&!location.pathname.endsWith('/index.html'))location.replace('index.html');});
window.addEventListener('pagehide',()=>{if(!location.pathname.endsWith('/index.html'))location.replace('index.html');});

renderGrid();
</script>
</body>
</html>
